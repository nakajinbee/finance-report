type: object
description: TBL-003 facts の1行に対応する汎用データ項目（FR-16の簡易確認画面で使用）
properties:
  element_id:
    type: string
    description: 要素ID
    example: jpcrp_cor:RevenueIFRSSummaryOfBusinessResults
  element_name:
    type: string
    nullable: true
    description: 項目名（日本語ラベル）
    example: 売上収益（IFRS）、経営指標等
  doc_type_code:
    type: string
    description: 書類種別コード（120=有価証券報告書、160=半期報告書）
    example: '120'
  period_end:
    type: string
    format: date
    description: 会計期間終了日
    example: '2026-03-31'
  context_id:
    type: string
    description: 原CSVのコンテキストID
    example: CurrentYearDuration
  consolidated_or_individual:
    type: string
    nullable: true
    description: 連結・個別の区分
    example: その他
  unit:
    type: string
    nullable: true
    description: 単位
    example: 円
  value:
    type: number
    description: 値
    example: 3697351000000
