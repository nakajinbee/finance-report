get:
  x-api-id: API-COM-001
  summary: 企業一覧取得
  description: DB に保存済みの企業一覧を返す。
  operationId: getCompanies
  responses:
    '200':
      description: 企業一覧
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../components/schemas/Company.yaml'
    '500':
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Error.yaml'
