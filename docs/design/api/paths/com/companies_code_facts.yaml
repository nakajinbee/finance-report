get:
  x-api-id: API-COM-004
  summary: 企業の保存済みファクト一覧取得
  description: |
    指定した証券コードの企業について、TBL-003 factsに保存済みの生データを一覧で返す（FR-16）。
    SCR-004（保存済みデータの簡易確認画面）専用。グラフ化・集計は行わない、生データの閲覧用API。
  operationId: getCompanyFacts
  parameters:
    - name: code
      in: path
      required: true
      schema:
        type: string
        example: '6098'
    - name: element_id
      in: query
      required: false
      description: 要素IDでの絞り込み（部分一致）
      schema:
        type: string
    - name: period_end
      in: query
      required: false
      description: 会計期間終了日での絞り込み（完全一致）
      schema:
        type: string
        format: date
  responses:
    '200':
      description: ファクト一覧
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../components/schemas/FactRecord.yaml'
    '404':
      description: 指定した企業が存在しない
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Error.yaml'
    '500':
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Error.yaml'
